name: INAMHI GloFAS discovery
on:
  push:
    branches: [revision-inamhi-glofas-validation]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: revision-inamhi-glofas-validation
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pandas pymupdf
      - run: python revision_analysis/discover_inamhi.py
      - name: Commit discovery outputs
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add revision_outputs
          git commit -m "Add automated INAMHI and GloFAS discovery outputs" || exit 0
          git push origin HEAD:revision-inamhi-glofas-validation
      - uses: actions/upload-artifact@v4
        with:
          name: inamhi-glofas-discovery
          path: revision_outputs
          retention-days: 30